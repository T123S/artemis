<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Artemis II - Photorealistische Visualisierung & Cockpit</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: 'Inter', sans-serif; touch-action: none; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 1rem; overflow: hidden;}
        @media (min-width: 640px) { #ui-layer { padding: 1.5rem; } }
        
        .glass-panel { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); pointer-events: auto; }
        
        /* Custom range slider styling */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -7px; box-shadow: 0 0 10px rgba(59, 130, 246, 0.8); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(255, 255, 255, 0.2); border-radius: 2px; }
        input[type=range]:focus { outline: none; }

        /* Popup Styles */
        #milestone-popup { display: none; }
        #milestone-popup.active { display: flex; }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="milestone-popup" class="active glass-panel p-4 sm:p-5 rounded-2xl shadow-2xl w-full max-w-sm flex-col gap-4 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-auto">
            <div class="flex justify-between items-start">
                <div class="flex gap-3 items-center">
                    <span id="popup-icon" class="text-3xl">📡❌</span>
                    <div>
                        <h2 id="popup-title" class="text-lg sm:text-xl font-bold text-blue-400">Loss of Signal (LOS)</h2>
                        <p id="popup-time" class="text-[10px] sm:text-xs text-gray-300">T+ 3 Tage, 12 Std</p>
                    </div>
                </div>
                <button id="close-popup" class="text-gray-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <p id="popup-desc" class="text-sm text-gray-200">Funkkontakt hinter dem Mond abgebrochen</p>
        </div>

        <div class="w-full flex items-end gap-2 sm:gap-4 mt-auto">
            
            <div class="glass-panel p-3 sm:p-5 rounded-xl sm:rounded-2xl shadow-2xl flex-grow flex items-center gap-3 sm:gap-6">
                <button id="play-pause-btn" class="bg-blue-600 hover:bg-blue-500 text-white rounded-full p-2.5 sm:p-4 transition-colors focus:outline-none flex-shrink-0 shadow-lg">
                    <svg id="icon-play" class="w-5 h-5 sm:w-6 sm:h-6 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg>
                    <svg id="icon-pause" class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                </button>
                
                <div class="w-full flex flex-col relative pt-1">
                    <div class="flex justify-between text-[9px] sm:text-xs text-gray-400 mb-1.5 px-1 font-medium">
                        <span class="hidden sm:inline">Start</span>
                        <span>Orbits</span>
                        <span>Mond-Flyby</span>
                        <span>Splashdown</span>
                    </div>
                    <input type="range" id="timeline-slider" min="0" max="1" step="0.001" value="0">
                </div>
            </div>

            <button id="camera-btn" class="glass-panel text-white rounded-xl sm:rounded-2xl p-3 sm:p-5 flex-shrink-0 flex flex-col items-center justify-center transition-all hover:bg-white/10 active:scale-95" title="Kamera Fokus ändern">
                <svg class="w-5 h-5 sm:w-6 sm:h-6 text-gray-300 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                <span id="camera-target-text" class="text-[8px] sm:text-[10px] font-bold text-blue-400 uppercase tracking-wide">Sicht: Cockpit</span>
            </button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Konstanten & Setup ---
        const DISTANCE_SCALE = 10000; 
        const EARTH_RADIUS = 6371 / DISTANCE_SCALE;
        const MOON_RADIUS = 1737 / DISTANCE_SCALE;
        const EARTH_MOON_DIST = 384400 / DISTANCE_SCALE;
        const MISSION_DURATION_DAYS = 10;
        
        let isPlaying = false;
        let progress = 0.0;
        let playbackSpeed = 0.0004; 
        let lastPos = new THREE.Vector3();

        // Kamera Fokus Variablen
        const VIEWS = ['Extern', 'Mond', 'Cockpit'];
        let currentViewIdx = 2; // Start in Cockpit Sicht

        // Meilenstein Definitionen
        const milestones = [
            { p: 0.12, icon: '🚀', title: 'ICPS Abtrennung', desc: 'Die ICPS-Raketenstufe wird abgetrennt', timeStr: 'T+ 2 Std' },
            { p: 0.22, icon: '🔥', title: 'TLI Burn Ende', desc: 'Translunar Injection Manöver abgeschlossen', timeStr: 'T+ 5 Std' },
            { p: 0.51, icon: '📡❌', title: 'Loss of Signal (LOS)', desc: 'Funkkontakt hinter dem Mond abgebrochen', timeStr: 'T+ 3 Tage, 12 Std' },
            { p: 0.54, icon: '📡✅', title: 'Acquisition of Signal (AOS)', desc: 'Funkkontakt wiederhergestellt', timeStr: 'T+ 3 Tage, 16 Std' },
            { p: 0.60, icon: '🌕', title: 'Mond-Periapsis (Flyby)', desc: 'Nächster Punkt zum Mond, 7400 km Höhe', timeStr: 'T+ 4 Tage, 1 Std' },
        ];
        let hotspotMeshes = [];

        // --- Szene, Kamera, Renderer ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.002);

        // Standard Extern-Kamera
        const cameraExtern = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        cameraExtern.position.set(0, 15, 30);
        
        // NEU: Cockpit-Kamera (wird später platziert)
        const cameraCockpit = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);

        let camera = cameraExtern; // Aktive Kamera

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true; // Eklipsen
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(cameraExtern, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 500;
        controls.minDistance = 1.0;

        // --- Beleuchtung & Mondphasen ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.05); 
        scene.add(ambientLight);
        
        // Sonne für photorealistische Schatten
        const sunLight = new THREE.DirectionalLight(0xffffff, 3.5);
        sunLight.position.set(200, 20, 100); 
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 500;
        const d = 60;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        scene.add(sunLight);

        // --- Milchstraße ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 12000;
        const posArray = new Float32Array(starsCount * 3);
        const colorArray = new Float32Array(starsCount * 3);
        const starColor = new THREE.Color();
        
        for(let i = 0; i < starsCount; i++) {
            let x, y, z;
            if (Math.random() < 0.4) {
                const r = 300 + Math.random() * 500;
                const theta = Math.random() * Math.PI * 2;
                const phi = (Math.random() - 0.5) * 0.4; 
                x = r * Math.cos(theta);
                y = r * Math.sin(phi) * 100; 
                z = r * Math.sin(theta);
                starColor.setHSL(Math.random() * 0.2 + 0.6, 0.8, Math.random() * 0.5 + 0.5);
            } else {
                x = (Math.random() - 0.5) * 1500;
                y = (Math.random() - 0.5) * 1500;
                z = (Math.random() - 0.5) * 1500;
                starColor.setHSL(0, 0, Math.random() * 0.8 + 0.2); 
            }
            posArray[i*3] = x; posArray[i*3+1] = y; posArray[i*3+2] = z;
            colorArray[i*3] = starColor.r; colorArray[i*3+1] = starColor.g; colorArray[i*3+2] = starColor.b;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        starsGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
        const starsMaterial = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, opacity: 0.8 });
        scene.add(new THREE.Points(starsGeometry, starsMaterial));

        // --- Erde (Photorealistisch) ---
        const earthGroup = new THREE.Group();
        const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 64, 64);
        const earthMat = new THREE.MeshPhongMaterial({ color: 0x0284c7, emissive: 0x022c22, shininess: 50 });
        const earthMesh = new THREE.Mesh(earthGeo, earthMat);
        earthMesh.castShadow = true; 
        earthMesh.receiveShadow = true; 
        earthGroup.add(earthMesh);
        const atmosGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.05, 32, 32);
        const atmosMat = new THREE.MeshBasicMaterial({ color: 0x7dd3fc, wireframe: true, transparent: true, opacity: 0.15 });
        earthGroup.add(new THREE.Mesh(atmosGeo, atmosMat));
        scene.add(earthGroup);

        // --- Mond (Photorealistisch) ---
        const moonGeo = new THREE.SphereGeometry(MOON_RADIUS, 64, 64);
        const moonMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
        const moon = new THREE.Mesh(moonGeo, moonMat);
        moon.castShadow = true; 
        moon.receiveShadow = true;
        moon.position.set(EARTH_MOON_DIST, 0, 0);
        scene.add(moon);

        // --- Flugbahn & Hotspots ---
        const r_leo = EARTH_RADIUS + 0.1; 
        const r_heo = EARTH_RADIUS * 4.0; 
        
        const curvePoints = [
            // LEO, HEO, TLI, Mond-Vorbeiflug, Rückweg, Splashdown
            new THREE.Vector3(r_leo, 0, 0), new THREE.Vector3(r_leo*0.7, r_leo*0.3, -r_leo*0.7), new THREE.Vector3(0, r_leo*0.4, -r_leo), new THREE.Vector3(-r_leo*0.7, r_leo*0.3, -r_leo*0.7), new THREE.Vector3(-r_leo, 0, 0), new THREE.Vector3(-r_leo*0.7, -r_leo*0.3, r_leo*0.7), new THREE.Vector3(0, -r_leo*0.4, r_leo), new THREE.Vector3(r_leo*0.7, -r_leo*0.3, r_leo*0.7), new THREE.Vector3(r_leo, 0, 0),
            new THREE.Vector3(r_heo*0.4, r_heo*0.2, -r_heo*0.4), new THREE.Vector3(0, r_heo*0.3, -r_heo), new THREE.Vector3(-r_heo*0.6, 0, -r_heo*0.6), new THREE.Vector3(-r_heo, -r_heo*0.1, 0), new THREE.Vector3(-r_heo*0.6, -r_heo*0.3, r_heo*0.6), new THREE.Vector3(0, -r_heo*0.4, r_heo), new THREE.Vector3(r_leo*1.5, -r_leo*0.2, r_leo*1.5), new THREE.Vector3(r_leo, 0, 0), 
            new THREE.Vector3(EARTH_MOON_DIST * 0.15, 2, -1.5), new THREE.Vector3(EARTH_MOON_DIST * 0.4, 4.5, -2.5), new THREE.Vector3(EARTH_MOON_DIST * 0.7, 4, -2.5), new THREE.Vector3(EARTH_MOON_DIST * 0.85, 2, -1.5),
            new THREE.Vector3(EARTH_MOON_DIST - 1.2, 0.5, -1.2), new THREE.Vector3(EARTH_MOON_DIST + MOON_RADIUS + 0.5, 0, -0.6), new THREE.Vector3(EARTH_MOON_DIST + MOON_RADIUS + 0.6, -0.2, 0), new THREE.Vector3(EARTH_MOON_DIST + MOON_RADIUS + 0.5, -0.3, 0.6), new THREE.Vector3(EARTH_MOON_DIST - 1.2, -0.8, 1.2),             
            new THREE.Vector3(EARTH_MOON_DIST * 0.85, -3, 2), new THREE.Vector3(EARTH_MOON_DIST * 0.5, -4.5, 3), new THREE.Vector3(EARTH_MOON_DIST * 0.2, -2, 2),
            new THREE.Vector3(0, -EARTH_RADIUS - 0.05, 0)
        ];

        const trajectoryCurve = new THREE.CatmullRomCurve3(curvePoints, false, 'centripetal', 0.5);
        
        // Flugbahn
        const tubularSegments = 500;
        const radialSegments = 6;
        const tubeGeo = new THREE.TubeGeometry(trajectoryCurve, tubularSegments, 0.04, radialSegments, false);
        
        const colors = [];
        const tempColor = new THREE.Color();
        for (let i = 0; i <= tubularSegments; i++) {
            const t = i / tubularSegments;
            const point = trajectoryCurve.getPointAt(t);
            const earthInfluence = 8 / Math.max(1, point.distanceTo(new THREE.Vector3(0,0,0)));
            const moonInfluence = 3 / Math.max(0.5, point.distanceTo(new THREE.Vector3(EARTH_MOON_DIST, 0, 0))); 
            const speedProxy = Math.max(0.1, earthInfluence, moonInfluence); 
            const hue = 0.66 - (Math.min(1.0, Math.max(0.0, (speedProxy - 0.2) / 6.0)) * 0.66);
            tempColor.setHSL(hue, 1.0, 0.5);
            for (let j = 0; j <= radialSegments; j++) colors.push(tempColor.r, tempColor.g, tempColor.b);
        }
        tubeGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        scene.add(new THREE.Mesh(tubeGeo, new THREE.MeshBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.8, wireframe: false })));

        // HOTSPOTS: Klickbare Meilensteine platzieren
        hotspotMeshes = milestones.map(ms => {
            const point = trajectoryCurve.getPointAt(ms.p);
            const hotspotGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const hotspotMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.7 });
            const mesh = new THREE.Mesh(hotspotGeo, hotspotMat);
            mesh.position.copy(point);
            mesh.milestoneData = ms; // Daten anhängen
            scene.add(mesh);
            return mesh;
        });

        // --- Raumschiff (Orion Kapsel) ---
        const shipGroup = new THREE.Group();
        const shipGeo = new THREE.ConeGeometry(0.2, 0.5, 12);
        shipGeo.rotateX(Math.PI / 2); 
        const shipMesh = new THREE.Mesh(shipGeo, new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x222222 }));
        shipMesh.castShadow = true; shipMesh.receiveShadow = true; 
        shipGroup.add(shipMesh);
        
        const panelGeo = new THREE.BoxGeometry(1.0, 0.04, 0.3);
        const panelMat = new THREE.MeshStandardMaterial({ color: 0x1e40af });
        const panel = new THREE.Mesh(panelGeo, panelMat);
        panel.position.z = -0.15; panel.castShadow = true; panel.receiveShadow = true;
        shipGroup.add(panel);

        // Triebwerks-Strahl
        const engineGlowMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const engineGlow = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.8, 16), engineGlowMat);
        engineGlow.rotation.x = -Math.PI / 2; engineGlow.position.z = -0.5;
        engineGlow.visible = false; shipGroup.add(engineGlow);
        scene.add(shipGroup);

        // Cockpit Kamera platzieren
        cameraCockpit.position.set(0, 0.15, 0.1); 
        shipGroup.add(cameraCockpit);

        // --- UI Referenzen & Raycaster ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const slider = document.getElementById('timeline-slider');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const cameraBtn = document.getElementById('camera-btn');
        const cameraTargetText = document.getElementById('camera-target-text');
        
        const popup = document.getElementById('milestone-popup');
        const popupIcon = document.getElementById('popup-icon');
        const popupTitle = document.getElementById('popup-title');
        const popupDesc = document.getElementById('popup-desc');
        const popupTime = document.getElementById('popup-time');
        const closePopupBtn = document.getElementById('close-popup');

        // --- Telemetrie & Logik ---
        function updateTelemetry() {
            const point = trajectoryCurve.getPointAt(progress);
            const tangent = trajectoryCurve.getTangentAt(progress);
            shipGroup.position.copy(point);
            shipGroup.lookAt(point.clone().add(tangent));
            
            // Triebwerk
            if ((progress > 0.22 && progress < 0.28) || (progress > 0.44 && progress < 0.46) || (progress > 0.58 && progress < 0.62)) {
                engineGlow.visible = true; engineGlow.scale.setScalar(0.9 + Math.random() * 0.2); 
            } else { engineGlow.visible = false; }

            if(!slider.matches(':active')) slider.value = progress;
        }

        function showPopup(ms) {
            popupIcon.innerText = ms.icon;
            popupTitle.innerText = ms.title;
            popupDesc.innerText = ms.desc;
            popupTime.innerText = ms.timeStr;
            popup.classList.add('active');
        }

        // --- Event Listeners ---
        container.addEventListener('click', (e) => {
            // Hotspot Klick Erkennung
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(hotspotMeshes);
            if (intersects.length > 0) {
                showPopup(intersects[0].object.milestoneData);
            }
        });

        closePopupBtn.addEventListener('click', () => popup.classList.remove('active'));

        playPauseBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            document.getElementById('icon-play').classList.toggle('hidden', isPlaying);
            document.getElementById('icon-pause').classList.toggle('hidden', !isPlaying);
            if (progress >= 1 && isPlaying) progress = 0; 
        });

        slider.addEventListener('input', e => { progress = parseFloat(e.target.value); updateTelemetry(); });

        cameraBtn.addEventListener('click', () => {
            currentViewIdx = (currentViewIdx + 1) % VIEWS.length;
